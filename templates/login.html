{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-4">
    <div class="card p-4">
      <div class="text-center mb-4">
        <i class="bi bi-tree-fill text-success" style="font-size:2.5rem"></i>
        <h4 class="mt-2 fw-bold">Welcome Back</h4>
        <p class="text-muted small">Sign in to Umusaruro Link</p>
      </div>
      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-main w-100 py-2 fw-semibold">Sign In</button>
      </form>
      <div class="text-center mt-3">
        <small>No account? <a href="/register" class="text-success fw-semibold">Register here</a></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
