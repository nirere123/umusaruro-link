{% extends 'base.html' %}
{% block title %}Edit Equipment{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h4 class="fw-bold mb-4"><i class="bi bi-pencil text-success me-2"></i>Edit Equipment</h4>
      <form method="POST" action="/edit-equipment/{{ item.id }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Name</label>
          <input type="text" name="name" class="form-control" value="{{ item.name }}" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ item.description }}</textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Daily Price (RWF)</label>
          <input type="number" name="price" class="form-control" value="{{ item.price }}" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Location</label>
          <input type="text" name="location" class="form-control" value="{{ item.location }}"/>
        </div>
        <button type="submit" class="btn btn-main w-100 py-2 fw-semibold">Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
