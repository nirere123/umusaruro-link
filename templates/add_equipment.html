{% extends 'base.html' %}
{% block title %}Add Equipment{% endblock %}
{% block content %}
<!--
  FILE     : templates/add_equipment.html
  MEMBER   : Aliya — Equipment Management
-->
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h4 class="fw-bold mb-4"><i class="bi bi-plus-circle text-success me-2"></i>List New Equipment</h4>
      <form method="POST" action="/add-equipment" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label fw-semibold">Equipment Photo</label>
          <input type="file" name="photo" class="form-control" accept="image/*" />
          <small class="text-muted">Upload a photo (JPG, PNG, etc.)</small>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Equipment Name</label>
          <input type="text" name="name" class="form-control" required placeholder="e.g. John Deere Tractor"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea name="description" class="form-control" rows="3" placeholder="Describe the equipment..."></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Daily Price (RWF)</label>
          <input type="number" name="price" class="form-control" required min="0" step="500" placeholder="15000"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Location</label>
          <input type="text" name="location" class="form-control" required placeholder="e.g. Musanze"/>
        </div>
        <button type="submit" class="btn btn-main w-100 py-2 fw-semibold">Add Equipment</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
