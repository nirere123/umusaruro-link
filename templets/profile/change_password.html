{% extends 'base.html' %}

{% block title %}Change Password - Umusaruro Link{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h4 class="mb-0"><i class="bi bi-key me-2"></i>Change Password</h4>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label for="current_password" class="form-label">Current Password</label>
            <input type="password" class="form-control" id="current_password"
                   name="current_password" required>
          </div>

          <div class="mb-3">
            <label for="new_password" class="form-label">New Password</label>
            <input type="password" class="form-control" id="new_password"
                   name="new_password" required minlength="6">
            <div class="form-text">Password must be at least 6 characters long.</div>
          </div>

          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirm_password"
                   name="confirm_password" required minlength="6">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-check-circle me-1"></i>Change Password
            </button>
            <a href="{{ url_for('profile.view') }}" class="btn btn-secondary">
              <i class="bi bi-x-circle me-1"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
// Simple client-side validation to check if passwords match
document.getElementById('confirm_password').addEventListener('input', function() {
  const newPass = document.getElementById('new_password').value;
  const confirmPass = this.value;

  if (newPass !== confirmPass) {
    this.setCustomValidity('Passwords do not match');
  } else {
    this.setCustomValidity('');
  }
});
</script>
{% endblock %}
